<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Dogs — A Field Guide</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="site-header">
    <div class="dex-shell">
      <div class="dex-screw dex-screw-tl"></div>
      <div class="dex-screw dex-screw-tr"></div>

      <div class="dex-top">
        <span class="dex-lens">
          <span class="dex-lens-shine"></span>
        </span>
        <span class="dex-lights">
          <span class="dex-light red"></span>
          <span class="dex-light yellow"></span>
          <span class="dex-light green"></span>
        </span>
      </div>

      <div class="dex-screen">
        <div class="eyebrow">Goa Ke Good Bois presents</div>
        <h1>The DogéDex</h1>
        <p>Meet the doggos of BITS Pilani KK Birla Goa Campus. In all their goofy glory.</p>
      </div>

      <div class="dex-screw dex-screw-bl"></div>
      <div class="dex-screw dex-screw-br"></div>
    </div>
  </header>

  <main id="grid" class="zones">
    <!-- Zone sections are injected here by js/app.js -->
  </main>

  <script src="js/app.js"></script>
</body>
</html>
